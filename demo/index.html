<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechCorp - Secured by NexAuth</title>
  <style>
    :root {
      --bg-color: #0b1120;
      --card-bg: #1e293b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --success: #10b981;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow-x: hidden;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(11, 17, 32, 0) 70%);
      z-index: -1;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      padding: 4rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      justify-content: center;
    }

    .header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1.125rem;
    }

    .login-wrapper {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.05);
      width: 100%;
      max-width: 400px;
      margin-bottom: 2.5rem;
      position: relative;
    }

    /* Container for the NexAuth SDK to inject into if needed */
    #nexauth-container {
      min-height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .security-badges {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: rgba(15, 23, 42, 0.6);
      padding: 1.5rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.05);
      width: 100%;
      max-width: 400px;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .badge-icon {
      font-size: 1.25rem;
    }

    .badge span.highlight {
      color: var(--success);
      font-weight: 600;
    }
    
    .badge span.brand {
      color: #fff;
      font-weight: 600;
    }

    .banner {
      width: 100%;
      background: linear-gradient(90deg, rgba(59,130,246,0.1) 0%, rgba(16,185,129,0.1) 100%);
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 1.5rem;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    .banner p {
      font-size: 1rem;
      color: var(--text-main);
      font-weight: 500;
    }

    .banner span.code {
      display: inline-block;
      margin-top: 0.75rem;
      font-family: monospace;
      color: #60a5fa;
      background: rgba(0,0,0,0.4);
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="logo">TechCorp</div>
      <p class="subtitle">Please login to continue</p>
    </div>

    <div class="login-wrapper">
      <!-- NexAuth SDK integration point -->
      <div id="nexauth-container">
        <!-- SDK will inject the form here. Fallback text below: -->
        <p style="color: var(--text-muted); text-align: center; font-size: 0.875rem;">Loading NexAuth...</p>
      </div>
    </div>

    <div class="security-badges">
      <div class="badge">
        <span class="badge-icon">🔐</span>
        <div>Secured by <span class="brand">NexAuth</span></div>
      </div>
      <div class="badge">
        <span class="badge-icon">✅</span>
        <div><span class="highlight">AI-Powered</span> Protection Active</div>
      </div>
      <div class="badge">
        <span class="badge-icon">💻</span>
        <div>Hardware-Bound Authentication</div>
      </div>
    </div>
  </div>

  <div class="banner">
    <p>This website uses NexAuth — Added with just one line of code</p>
    <span class="code">&lt;script src="../sdk/nexauth.js" data-key="demo-key-123"&gt;&lt;/script&gt;</span>
  </div>

  <!-- NexAuth SDK Injection -->
  <script 
    src="../sdk/nexauth.js" 
    data-key="demo-key-123">
  </script>
</body>
</html>
